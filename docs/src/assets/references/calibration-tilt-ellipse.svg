<?xml version="1.0" encoding="UTF-8"?>
<!-- 260602Cl 追加: 傾いた IP 上で回折リングが楕円になる様子と傾き量 τ の決定 (Appendix A2 用)。
     φ 方向から見た投影図。直線 IP が回折コーン(半頂角 2θ)を切り、近側/遠側の交点 l1, l2 が
     l1=CL sin2θ/cos(2θ-τ), l2=CL sin2θ/cos(2θ+τ)。楕円中心はダイレクトスポットから R=(l2-l1)/2 ずれる。
     座標は 2θ=26.57°(tan2θ=0.5), τ=18°, CL=240px で作図し R=21px を検算済み。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="te-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#222"/>
    </marker>
    <marker id="te-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="te-dim" markerWidth="9" markerHeight="9" refX="4" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f6fb0"/>
    </marker>
    <marker id="te-dim2" markerWidth="9" markerHeight="9" refX="3" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f6fb0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="480" height="360" fill="#ffffff"/>

  <!-- untilted reference plane (perpendicular to beam) -->
  <line x1="300" y1="58" x2="300" y2="300" stroke="#bbb" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- diffraction cone edges -->
  <line x1="60" y1="180" x2="320" y2="50" stroke="#c0392b" stroke-width="1.6" marker-end="url(#te-red)"/>
  <line x1="60" y1="180" x2="380" y2="340" stroke="#c0392b" stroke-width="1.6" marker-end="url(#te-red)"/>

  <!-- incident + direct beam -->
  <line x1="8" y1="180" x2="60" y2="180" stroke="#222" stroke-width="1.8" marker-end="url(#te-arrow)"/>
  <line x1="60" y1="180" x2="430" y2="180" stroke="#555" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#te-arrow)"/>

  <!-- tilted imaging plate -->
  <line x1="259.8" y1="56.4" x2="351" y2="337" stroke="#1f6fb0" stroke-width="3"/>
  <text x="150" y="58" font-size="12.5" fill="#1f6fb0">Imaging Plate</text>

  <!-- sample -->
  <rect x="54" y="174" width="12" height="12" fill="#e08020" stroke="#222"/>
  <text x="12" y="170" font-size="12.5" fill="#222">Incident beam</text>
  <text x="30" y="205" font-size="12.5" fill="#222">Sample</text>
  <text x="356" y="172" font-size="12.5" fill="#555">Direct beam</text>

  <!-- intersection points -->
  <circle cx="266.5" cy="76.8" r="3.2" fill="#222"/>
  <circle cx="346.5" cy="323.3" r="3.2" fill="#222"/>
  <!-- direct spot + ellipse center -->
  <circle cx="300" cy="180" r="3.4" fill="#222"/>
  <circle cx="306.5" cy="200" r="3.4" fill="#c0392b"/>
  <text x="300" y="170" font-size="12.5" fill="#222">Direct spot</text>
  <text x="314" y="214" font-size="12.5" fill="#c0392b">Ellipse center</text>

  <!-- 2theta arc -->
  <path d="M 106 180 A 46 46 0 0 0 101 159" fill="none" stroke="#222" stroke-width="1.2"/>
  <text x="110" y="170" font-size="12.5" fill="#222">2&#952;</text>

  <!-- tau arc between untilted plane and IP -->
  <path d="M 300 150 A 30 30 0 0 0 290.7 151.5" fill="none" stroke="#222" stroke-width="1.2"/>
  <text x="283" y="146" font-size="12.5" fill="#222">&#964;</text>

  <!-- CL dimension along the beam -->
  <line x1="60" y1="196" x2="300" y2="196" stroke="#1f6fb0" stroke-width="1" marker-start="url(#te-dim2)" marker-end="url(#te-dim)"/>
  <text x="168" y="210" font-size="12.5" fill="#1f6fb0">CL</text>

  <!-- R dimension (direct spot -> ellipse center) -->
  <line x1="300" y1="180" x2="306.5" y2="200" stroke="#c0392b" stroke-width="1.4"/>
  <text x="290" y="240" font-size="12.5" fill="#c0392b">R</text>
  <line x1="296" y1="236" x2="304" y2="194" stroke="#c0392b" stroke-width="0.8"/>

  <!-- near / far intercept labels -->
  <text x="180" y="120" font-size="12" fill="#444">&#8467;&#8321;</text>
  <text x="352" y="268" font-size="12" fill="#444">&#8467;&#8322;</text>
</svg>
