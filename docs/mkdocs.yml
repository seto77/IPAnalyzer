# 260531Ch: MkDocs Material configuration for the IPAnalyzer GitHub Pages manual.
# 260625Cl: 多言語化のため mkdocs-static-i18n (folder mode) へ移行 (ReciPro と同じ構成)。
#   - en を default locale としてサイトルート (/IPAnalyzer/) へ、ja を /IPAnalyzer/ja/ へ出力。
#   - 未訳ページは fallback_to_default で英語本文をローカライズ URL に自動生成 (ページ単位の増分公開)。
#   - 言語切替は reconfigure_material が Material のセレクタを現在ページ基準で自動構成 (旧 language_switch.js は廃止)。
#   - IPAnalyzer の GUI は en/ja のみローカライズ済みのため、他言語ページは英語スクリーンショットを表示する
#     (overrides/main.html のバナーで明示)。新言語は plugins.i18n.languages に 1 行ずつ追加していく。
site_name: IPAnalyzer Manual
site_description: IPAnalyzer user manual
site_url: https://seto77.github.io/IPAnalyzer/
repo_url: https://github.com/seto77/IPAnalyzer
repo_name: seto77/IPAnalyzer
edit_uri: edit/master/docs/src/

docs_dir: src
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  custom_dir: overrides   # 260625Cl: 未訳=英語フォールバック告知 + 他言語スクショ注記バナー (overrides/main.html)
  features:
    # 260625Cl: navigation.tabs / navigation.tabs.sticky は言語タブ用途だったため撤去。
    #   多言語化後は言語選択をヘッダーのセレクタ (static-i18n が構成) に一本化し、
    #   nav は 1 言語ぶん (章立て) を左サイドバーに出す。
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# 260625Cl: 旧英語 URL (/en/<slug>/) → 新ルート URL (/<slug>/) 互換の stub を post-build で生成。
#   mkdocs-redirects は static-i18n 再ホーム後のルート URL を target にできない (ReciPro 実測) ため、
#   英語の /en/ 互換はこのフックが担当する。IPAnalyzer はリネーム履歴が無いので現行ページの自動 alias のみ。
hooks:
  - hooks/legacy_en_redirects.py

plugins:
  - search:
      lang:
        - en
        - ja
  - glightbox
  # 260625Cl: 多言語化プラグイン。languages は en (default=ルート出力) / ja。新言語はここに 1 行ずつ追加していく。
  #   redirects より前に置く: redirects (将来の JA リネーム履歴) は i18n 適用後のファイル URL を解決する必要がある。
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            0. Overview: 0. 概要
            1. Main Window: 1. メインウィンドウ
            2. Property Windows: 2. プロパティウィンドウ
            3. Tools: 3. 各種ツール
            4. Procedures: 4. 実際の手順
            5. Macro: 5. マクロ
            5.1. Built-in functions: 5.1. 組み込み関数
            5.2. Examples: 5.2. 使用例
            6. Find Parameter (brute force): 6. パラメータ校正（力ずく）
            Appendix: 付録
            A1. Detector geometry: A1. 検出器の幾何
            A2. Parameter determination: A2. パラメータの決定
            A3. Image integration: A3. 画像の積算
            A4. Symmetry information: A4. 対称性情報
            A5. Scattering factor: A5. 散乱因子
        # 260626Cl: Phase 1 = de パイロット。IPAnalyzer の GUI は en/ja のみローカライズ済みのため、
        #   de ページは英語スクリーンショット (cap-en-auto) を表示する (overrides/main.html のバナーで明示)。
