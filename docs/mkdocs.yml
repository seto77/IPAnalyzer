# 260531Ch: MkDocs Material configuration for the IPAnalyzer GitHub Pages manual.
site_name: IPAnalyzer Manual
site_description: IPAnalyzer user manual
site_url: https://seto77.github.io/IPAnalyzer/
repo_url: https://github.com/seto77/IPAnalyzer
repo_name: seto77/IPAnalyzer
edit_uri: edit/master/docs/src/

docs_dir: src
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - ja
  - glightbox
  - redirects:
      redirect_maps: {}

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/language_switch.js

extra:
  alternate:
    - name: English
      link: /IPAnalyzer/
      lang: en
    - name: 日本語
      link: /IPAnalyzer/ja/
      lang: ja

nav:
  - English:
      - Home: index.md
      - 0. Overview: en/0-overview.md
      - 1. Main Window: en/1-main-window.md
      - 2. Property Windows: en/2-property-windows.md
      - 3. Tools: en/3-tools.md
      - 4. Procedures: en/4-procedures.md
      - 5. Macro:
          - en/5-macro/index.md
          - 5.1. Built-in functions: en/5-macro/1-built-in-functions.md
          - 5.2. Examples: en/5-macro/2-examples.md
      - 6. Find Parameter (brute force): en/6-find-parameter.md
      - Appendix:
          - en/appendix/index.md
          - A1. Detector geometry: en/appendix/a1-geometry.md
          - A2. Parameter determination: en/appendix/a2-calibration.md
          - A3. Image integration: en/appendix/a3-image-integration.md
          - A4. Symmetry information: en/appendix/a4-symmetry-information.md
          - A5. Scattering factor: en/appendix/a5-scattering-factor.md
  - 日本語:
      - ホーム: ja/index.md
      - 0. 概要: ja/0-overview.md
      - 1. メインウィンドウ: ja/1-main-window.md
      - 2. プロパティウィンドウ: ja/2-property-windows.md
      - 3. 各種ツール: ja/3-tools.md
      - 4. 実際の手順: ja/4-procedures.md
      - 5. マクロ:
          - ja/5-macro/index.md
          - 5.1. 組み込み関数: ja/5-macro/1-built-in-functions.md
          - 5.2. 使用例: ja/5-macro/2-examples.md
      - 6. パラメータ校正（力ずく）: ja/6-find-parameter.md
      - 付録:
          - ja/appendix/index.md
          - A1. 検出器の幾何: ja/appendix/a1-geometry.md
          - A2. パラメータの決定: ja/appendix/a2-calibration.md
          - A3. 画像の積算: ja/appendix/a3-image-integration.md
          - A4. 対称性情報: ja/appendix/a4-symmetry-information.md
          - A5. 散乱因子: ja/appendix/a5-scattering-factor.md
