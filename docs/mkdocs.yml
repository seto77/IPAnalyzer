  # 260625Cl: 日本語ページのリネーム/移動履歴の redirect 用スロット (現状リネーム履歴は無いので空)。
  #   i18n の後に置くこと (i18n 適用後の File URL を解決させるため)。
  #   罠: 'foo.md':'foo/index.md' 形の自己ループ redirect を張らない (use_directory_urls で同一 URL)。
  - redirects:
      redirect_maps: {}

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # 260625Cl: 非ASCII 見出し (日本語・独・露・中・韓) の slug を機能させる (pymdownx の Unicode slugify)。
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  # 260625Cl: 言語切替 JS (language_switch.js) は static-i18n の reconfigure_material が
  #   現在ページ基準のセレクタを構成するため不要になり廃止。

# 260625Cl: extra.alternate は static-i18n が自動構成するため手書きしない。

nav:
  - Home: index.md
  - 0. Overview: 0-overview.md
  - 1. Main Window: 1-main-window.md
  - 2. Property Windows: 2-property-windows.md
  - 3. Tools: 3-tools.md
  - 4. Procedures: 4-procedures.md
  - 5. Macro:
      - 5-macro/index.md
      - 5.1. Built-in functions: 5-macro/1-built-in-functions.md
      - 5.2. Examples: 5-macro/2-examples.md
  - 6. Find Parameter (brute force): 6-find-parameter.md
  - Appendix:
      - appendix/index.md
      - A1. Detector geometry: appendix/a1-geometry.md
      - A2. Parameter determination: appendix/a2-calibration.md
      - A3. Image integration: appendix/a3-image-integration.md
      - A4. Symmetry information: appendix/a4-symmetry-information.md
      - A5. Scattering factor: appendix/a5-scattering-factor.md
