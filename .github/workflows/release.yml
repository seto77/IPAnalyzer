# 260406Cl IPAnalyzer 用に PDIndexer の release.yml を改修
name: Build And Release Installer

on:
  push:
    branches: [master]
    paths:
      - "IPAnalyzer/Version.cs"
  workflow_dispatch:
    inputs:
      force:
        description: "既存リリースを削除してリビルドする"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse version and check if release needed
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content "IPAnalyzer\Version.cs" -Raw
          if ($content -notmatch 'ver(\d+\.\d+)\(') {
            throw "Could not parse version from Version.cs History."
          }
          $ver = $Matches[1]
          $tag = "v.$ver"

          # 同じバージョンのリリースが既にあればスキップ (force 時は既存を削除して続行)
          gh release view $tag 2>&1 | Out-Null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $global:LASTEXITCODE = 0
          if ($releaseExists) {
            if ("${{ inputs.force }}" -eq "true") {
              Write-Host "Force mode: deleting existing release $tag..."
              gh release delete $tag --yes
              git push origin :refs/tags/$tag 2>&1 | Out-Null
              $global:LASTEXITCODE = 0
            } else {
              Write-Host "Release $tag already exists. Skipping."
              "needed=false" >> $env:GITHUB_OUTPUT
              return
            }
          }

          # History の先頭行をリリースノートに使う
          $historyLine = ([regex]::Match($content, 'ver[^\r\n"]+').Value).Trim()
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.txt"
          $historyLine | Set-Content -Path $notesPath -Encoding UTF8

          # AssemblyVersion / FileVersion 用のタイムスタンプ (yyyy.M.d.HHmm UTC)
          $now = [System.DateTime]::UtcNow
          $assemblyVer = "$($now.Year).$($now.Month).$($now.Day).$($now.ToString('HHmm'))"

          Write-Host "New version detected: $ver (tag: $tag, assembly: $assemblyVer)"
          "needed=true"           >> $env:GITHUB_OUTPUT
          "version=$ver"          >> $env:GITHUB_OUTPUT
          "tag=$tag"              >> $env:GITHUB_OUTPUT
          "product_version=0.$ver" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVer" >> $env:GITHUB_OUTPUT

      # ---- 以降、新バージョンが検出されたときのみ実行 ----

      - name: Setup .NET 10
        if: steps.version.outputs.needed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore managed dependencies
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: dotnet restore IPAnalyzer\IPAnalyzer.csproj

      - name: Find devenv.com
        if: steps.version.outputs.needed == 'true'
        id: devenv
        shell: pwsh
        run: |
          $devenvExe = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property productPath).Trim()
          if (-not $devenvExe) { throw "Visual Studio was not found." }
          $cli = [System.IO.Path]::ChangeExtension($devenvExe, ".com")
          if (-not (Test-Path $cli)) { throw "devenv.com was not found." }
          Write-Host "devenv.com: $cli"
          "cli=$cli" >> $env:GITHUB_OUTPUT

      - name: Build managed application
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: dotnet build IPAnalyzer\IPAnalyzer.csproj -c Release -p:Platform=x64 -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} --no-restore

      - name: Update installer version in vdproj
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: |
          $vdproj = Get-Content "IPAnalyzerSetup\IPAnalyzerSetup.vdproj" -Raw

          # ProductVersion を更新 (例: "8:0.3.973")
          $vdproj = $vdproj -replace '"ProductVersion" = "8:[^"]*"', '"ProductVersion" = "8:${{ steps.version.outputs.product_version }}"'

          # ProductCode と PackageCode を新しい GUID に更新 (UpgradeCode は変えない)
          $newProductCode = ([guid]::NewGuid()).ToString("B").ToUpper()
          $newPackageCode = ([guid]::NewGuid()).ToString("B").ToUpper()
          $vdproj = $vdproj -replace '"ProductCode" = "8:\{[^}]+\}"', "`"ProductCode`" = `"8:$newProductCode`""
          $vdproj = $vdproj -replace '"PackageCode" = "8:\{[^}]+\}"', "`"PackageCode`" = `"8:$newPackageCode`""

          Set-Content "IPAnalyzerSetup\IPAnalyzerSetup.vdproj" $vdproj -NoNewline
          Write-Host "ProductVersion = 0.${{ steps.version.outputs.version }}"
          Write-Host "ProductCode    = $newProductCode"
          Write-Host "PackageCode    = $newPackageCode"

      - name: Disable out-of-proc setup project build
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: |
          $visualStudioRoot = "HKCU:\Software\Microsoft\VisualStudio"
          Get-ChildItem $visualStudioRoot -ErrorAction SilentlyContinue |
            Where-Object { $_.PSChildName -like '17.0*_Config' -or $_.PSChildName -like '18.0*_Config' } |
            ForEach-Object {
              $key = Join-Path $_.PSPath "MSBuild"
              if (-not (Test-Path $key)) { New-Item -Path $key -Force | Out-Null }
              New-ItemProperty -Path $key -Name DisableOutOfProcBuild -PropertyType DWord -Value 1 -Force | Out-Null
              Write-Host "Set DisableOutOfProcBuild=1 at $key"
            }

      - name: Create installer-only solution
        if: steps.version.outputs.needed == 'true'
        id: pack_solution
        shell: pwsh
        run: |
          $solutionPath = Join-Path (Get-Location) "IPAnalyzerSetup.CI.sln"
          @'
          Microsoft Visual Studio Solution File, Format Version 12.00
          # Visual Studio Version 18
          VisualStudioVersion = 18.1.11304.174
          MinimumVisualStudioVersion = 10.0.40219.1
          Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "IPAnalyzer", "IPAnalyzer\IPAnalyzer.csproj", "{FB4EF56F-1D54-4C20-B917-BD039DF5087F}"
          EndProject
          Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "Crystallography", "Crystallography\Crystallography.csproj", "{A83FB49A-D844-49F3-BB0B-57366C9C7F8E}"
          EndProject
          Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "Crystallography.Controls", "Crystallography.Controls\Crystallography.Controls.csproj", "{FD2B1025-7A73-4AD7-9C59-16F9BE24AB78}"
          EndProject
          Project("{54435603-DBB4-11D2-8724-00A0C9A8B90C}") = "IPAnalyzerSetup", "IPAnalyzerSetup\IPAnalyzerSetup.vdproj", "{2F0447A9-4FCC-484F-AC52-E06DD5D6D9AC}"
          EndProject
          Global
          	GlobalSection(SolutionConfigurationPlatforms) = preSolution
          		Release|x64 = Release|x64
          	EndGlobalSection
          	GlobalSection(ProjectConfigurationPlatforms) = postSolution
          		{FB4EF56F-1D54-4C20-B917-BD039DF5087F}.Release|x64.ActiveCfg = Release|x64
          		{A83FB49A-D844-49F3-BB0B-57366C9C7F8E}.Release|x64.ActiveCfg = Release|x64
          		{FD2B1025-7A73-4AD7-9C59-16F9BE24AB78}.Release|x64.ActiveCfg = Release|x64
          		{2F0447A9-4FCC-484F-AC52-E06DD5D6D9AC}.Release|x64.ActiveCfg = Release
          		{2F0447A9-4FCC-484F-AC52-E06DD5D6D9AC}.Release|x64.Build.0 = Release
          	EndGlobalSection
          EndGlobal
          '@ | Set-Content -Path $solutionPath -Encoding ASCII
          "path=$solutionPath" >> $env:GITHUB_OUTPUT

      - name: Build installer with Visual Studio
        id: build_installer
        if: steps.version.outputs.needed == 'true'
        timeout-minutes: 10
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "devenv-setup.log"
          & "${{ steps.devenv.outputs.cli }}" "${{ steps.pack_solution.outputs.path }}" /Build "Release|x64" /Project "IPAnalyzerSetup" /Out $log
          $exitCode = $LASTEXITCODE
          if (Test-Path $log) { Get-Content $log }
          if ($exitCode -ne 0) { throw "IPAnalyzerSetup build failed (exit $exitCode)." }

          # MSI の存在確認
          $msi = Get-ChildItem -Path "IPAnalyzerSetup" -Filter "IPAnalyzerSetup.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) { throw "IPAnalyzerSetup.msi was not found." }
          Write-Host "MSI built: $($msi.FullName)"
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifacts
        if: steps.version.outputs.needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: IPAnalyzer-installer-v.${{ steps.version.outputs.version }}
          path: ${{ steps.build_installer.outputs.msi_path }}

      - name: Create tag and GitHub Release
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          # タグを作成してプッシュ
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "IPAnalyzer ${{ steps.version.outputs.version }}"
          git push origin $tag

          # リリースを作成して MSI を添付
          gh release create $tag `
            "${{ steps.build_installer.outputs.msi_path }}" `
            --title "IPAnalyzer $tag" `
            --notes-file "${{ steps.version.outputs.notes_path }}"
