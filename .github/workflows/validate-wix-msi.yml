# 260625Cl WiX 移行 Phase A 検証ワークフロー (codex 相談済み・PDIndexer_WiX移行計画.md を IPAnalyzer 用に具体化)
#   - WiX v7 で x64/arm64 両 MSI をビルドし、旧 vdproj MSI (最新 release) と内容 diff (情報レポート)
#   - クリーンランナー上で「vdproj 旧版 install → WiX 新版で Major Upgrade → uninstall」の連鎖テスト
#   - release には一切触れない (artifact のみ・contents: read)。本番 release.yml に置換するまでの並行検証用
#   - x64⇔arm64 cross-grade テストは windows-11-arm が必要なため Phase C の smoke で実施 (ここでは不可)
#   PDIndexer\.github\workflows\validate-wix-msi.yml を IPAnalyzer 用に移植。IPAnalyzer 固有:
#     * native 依存ゼロ (libxrl も Crystallography.Native も同梱しない) → 「必須」ではなく「禁止」アサートに反転
#     * glfw3.dll は OpenTK 透過の死荷物で実行時未使用 (--capture で全フォーム構築を実証済) → staging から除外
#     * satellite は Crystallography.Controls / IPAnalyzer 本体ともに10カルチャ (260701Cl: IPAnalyzer 側も全カルチャ検査に拡張)
name: Validate WiX MSI (Phase A)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    # IPAnalyzer は native vcxproj が無いため devenv 不要。当面 release.yml と同じイメージを使う (windows-2025 への簡素化は別途検証)
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive # shared libs are git submodules

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "IPAnalyzer\Version.cs" -Raw
          if ($content -notmatch 'ver(\d+\.\d+)\(') { throw "Could not parse version from Version.cs History." }
          $ver = $Matches[1]
          # アップグレード連鎖テスト用に build 番号を +1 した版数 (旧 release MSI より必ず新しくする)
          $parts = $ver.Split('.')
          $bumped = "$($parts[0]).$([int]$parts[1] + 1)"
          # FileVersion 注入は必須 (ReciPro 実測): 注入しないと csproj 静的値 (過去日付) が使われ、旧 release
          # (より新しい FileVersion) からのアップグレードで自前アセンブリの FileCopy が costing で省略され欠落する
          $now = [System.DateTime]::UtcNow
          $assemblyVer = "$($now.Year).$($now.Month).$($now.Day).$($now.ToString('HHmm'))"
          Write-Host "version=$ver bumped=$bumped assembly=$assemblyVer"
          "version=$ver"                   >> $env:GITHUB_OUTPUT
          "product_version=0.$ver"         >> $env:GITHUB_OUTPUT
          "test_product_version=0.$bumped" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVer"  >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore managed dependencies
        shell: pwsh
        run: dotnet restore IPAnalyzer\IPAnalyzer.csproj

      - name: Stage x64 MSI payload (framework-dependent publish)
        shell: pwsh
        run: |
          $s = "artifacts\staging-msi-x64"
          dotnet publish IPAnalyzer\IPAnalyzer.csproj -c Release -p:Platform=x64 --self-contained false -o $s --no-restore `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          if ($LASTEXITCODE -ne 0) { throw "x64 publish failed." }
          # glfw3.dll を除外 (IPAnalyzer は GLFW/GLControl を生成せず実行時未使用、--capture で実証済)
          Get-ChildItem $s -Filter "glfw3*.dll" -ErrorAction SilentlyContinue | Remove-Item -Force
          # LICENSE.rtf / REQUIREMENT.rtf を同梱 (IPAnalyzerSetup.Wix\ に配置済み。WiX プロジェクトは自己完結)
          Copy-Item IPAnalyzerSetup.Wix\LICENSE.rtf, IPAnalyzerSetup.Wix\REQUIREMENT.rtf $s
          # 参照プロジェクトの分離 pdb は同梱しない (portable ZIP と同方針)
          Get-ChildItem $s -Filter *.pdb | Remove-Item
          # 出荷前検査: 必須 / 禁止
          if (-not (Test-Path "$s\IPAnalyzer.exe")) { throw "IPAnalyzer.exe missing from staging" }
          if (Test-Path "$s\README-PORTABLE.txt") { throw "README-PORTABLE.txt leaked (portable marker must not be in MSI)" }
          if (Test-Path "$s\coreclr.dll") { throw "self-contained runtime leaked into framework-dependent staging" }
          if (Test-Path "$s\glfw3.dll") { throw "glfw3.dll leaked (must be excluded; IPAnalyzer does not use GLFW)" }
          # IPAnalyzer は native 依存ゼロ。これらが現れたら供給経路の意図しない変化なので止める
          if (Test-Path "$s\libxrl-11.dll") { throw "libxrl-11.dll appeared (IPAnalyzer does not bundle xraylib)" }
          if (Get-ChildItem $s -Filter "Crystallography.Native*" -ErrorAction SilentlyContinue) { throw "Crystallography.Native* appeared (IPAnalyzer does not bundle it)" }
          Write-Host "x64 staging OK: $((Get-ChildItem $s -Recurse -File).Count) files"

      # 260701Cl 追加: satellite 検査 (10 カルチャ x 2 アセンブリ) を composite action に集約 (旧: インライン $controlsCultures チェック、3ワークフロー6箇所に重複していた)
      - name: Verify satellites (x64 staging)
        uses: ./.github/actions/verify-satellites
        with:
          staging-dir: artifacts\staging-msi-x64
          label: x64 staging

      - name: Stage arm64 MSI payload (framework-dependent publish)
        shell: pwsh
        run: |
          $s = "artifacts\staging-msi-arm64"
          dotnet publish IPAnalyzer\IPAnalyzer.csproj -c Release -r win-arm64 -p:Platform=ARM64 --self-contained false -o $s `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          if ($LASTEXITCODE -ne 0) { throw "arm64 publish failed." }
          Get-ChildItem $s -Filter "glfw3*.dll" -ErrorAction SilentlyContinue | Remove-Item -Force
          Copy-Item IPAnalyzerSetup.Wix\LICENSE.rtf, IPAnalyzerSetup.Wix\REQUIREMENT.rtf $s
          Get-ChildItem $s -Filter *.pdb | Remove-Item
          if (-not (Test-Path "$s\IPAnalyzer.exe")) { throw "IPAnalyzer.exe missing from arm64 staging" }
          if (Test-Path "$s\README-PORTABLE.txt") { throw "README-PORTABLE.txt leaked" }
          if (Test-Path "$s\coreclr.dll") { throw "self-contained runtime leaked" }
          if (Test-Path "$s\glfw3.dll") { throw "glfw3.dll leaked (must be excluded)" }
          if (Test-Path "$s\libxrl-11.dll") { throw "libxrl-11.dll appeared (IPAnalyzer does not bundle xraylib)" }
          if (Get-ChildItem $s -Filter "Crystallography.Native*" -ErrorAction SilentlyContinue) { throw "Crystallography.Native* appeared" }
          # PE machine 検査 (0xAA64): IPAnalyzer.exe が arm64 であること (native 非同梱なので検査対象は exe のみ)
          function Get-PEMachine($path) {
            $fs = [System.IO.File]::OpenRead($path); $br = New-Object System.IO.BinaryReader($fs)
            $fs.Seek(0x3C,0) | Out-Null; $peOff = $br.ReadInt32(); $fs.Seek($peOff+4,0) | Out-Null
            $m = $br.ReadUInt16(); $fs.Close(); $m
          }
          $m = Get-PEMachine (Join-Path $PWD "$s\IPAnalyzer.exe")
          if ($m -ne 0xAA64) { throw ("IPAnalyzer.exe: PE machine 0x{0:X4} != 0xAA64" -f $m) }
          Write-Host "arm64 staging OK: $((Get-ChildItem $s -Recurse -File).Count) files"

      - name: Verify satellites (arm64 staging)
        uses: ./.github/actions/verify-satellites
        with:
          staging-dir: artifacts\staging-msi-arm64
          label: arm64 staging

      - name: Build WiX x64 MSI (bumped version for upgrade test)
        shell: pwsh
        run: |
          dotnet build IPAnalyzerSetup.Wix\IPAnalyzerSetup.wixproj -c Release -p:InstallerPlatform=x64 `
            -p:ProductVersion=${{ steps.version.outputs.test_product_version }} `
            -p:StagingDir="$PWD\artifacts\staging-msi-x64"
          if ($LASTEXITCODE -ne 0) { throw "WiX x64 build failed." }
          if (-not (Test-Path "IPAnalyzerSetup.Wix\bin\Release\IPAnalyzer-setup.msi")) { throw "IPAnalyzer-setup.msi not produced." }

      - name: Build WiX arm64 MSI (cross-build)
        shell: pwsh
        run: |
          dotnet build IPAnalyzerSetup.Wix\IPAnalyzerSetup.wixproj -c Release -p:InstallerPlatform=arm64 `
            -p:ProductVersion=${{ steps.version.outputs.product_version }} `
            -p:StagingDir="$PWD\artifacts\staging-msi-arm64"
          if ($LASTEXITCODE -ne 0) { throw "WiX arm64 build failed." }
          if (-not (Test-Path "IPAnalyzerSetup.Wix\bin\Release\IPAnalyzer-setup_arm64.msi")) { throw "IPAnalyzer-setup_arm64.msi not produced." }

      - name: Verify MSI properties (Template / UpgradeCode / version / per-user)
        shell: pwsh
        run: |
          $wi = New-Object -ComObject WindowsInstaller.Installer
          function Get-MsiProp($db, $name) {
            $view = $db.GetType().InvokeMember('OpenView','InvokeMethod',$null,$db,@("SELECT Value FROM Property WHERE Property='$name'"))
            $view.GetType().InvokeMember('Execute','InvokeMethod',$null,$view,$null) | Out-Null # 戻り値混入防止
            $rec = $view.GetType().InvokeMember('Fetch','InvokeMethod',$null,$view,$null)
            if ($rec) { $rec.GetType().InvokeMember('StringData','GetProperty',$null,$rec,@(1)) } else { $null }
          }
          function Test-Msi($path, $expectTemplate, $expectVersion) {
            $db = $wi.GetType().InvokeMember('OpenDatabase','InvokeMethod',$null,$wi,@($path,0))
            $si = $db.GetType().InvokeMember('SummaryInformation','GetProperty',$null,$db,@(0))
            $template = $si.GetType().InvokeMember('Property','GetProperty',$null,$si,@(7))
            $schema = $si.GetType().InvokeMember('Property','GetProperty',$null,$si,@(14))
            $uc = Get-MsiProp $db 'UpgradeCode'; $pv = Get-MsiProp $db 'ProductVersion'; $au = Get-MsiProp $db 'ALLUSERS'
            Write-Host "$path : Template=$template Schema=$schema UpgradeCode=$uc Version=$pv ALLUSERS=$au"
            if ($template -notlike "$expectTemplate*") { throw "Template mismatch: $template (expected $expectTemplate)" }
            if ($uc -ne '{7C0F1D74-5E13-4143-826B-A422F43A7514}') { throw "UpgradeCode mismatch: $uc" }
            if ($pv -ne $expectVersion) { throw "ProductVersion mismatch: $pv (expected $expectVersion)" }
            if ($au) { throw "ALLUSERS must be unset for per-user package (got $au)" }
            if ([int]$schema -lt 500) { throw "Schema $schema < 500" }
          }
          Test-Msi "IPAnalyzerSetup.Wix\bin\Release\IPAnalyzer-setup.msi" 'x64' '${{ steps.version.outputs.test_product_version }}'
          Test-Msi "IPAnalyzerSetup.Wix\bin\Release\IPAnalyzer-setup_arm64.msi" 'Arm64' '${{ steps.version.outputs.product_version }}'

      - name: Download latest released vdproj MSI
        id: oldmsi
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP\old-msi" | Out-Null
          # 旧名 *Setup.msi (現行 release は IPAnalyzerSetup.msi)。新主名称 IPAnalyzer-setup.msi (小文字 setup) はこの
          # pattern (大文字 Setup) に一致しないので拾わない。
          gh release download --pattern "*Setup.msi" -D "$env:RUNNER_TEMP\old-msi"
          $old = Get-ChildItem "$env:RUNNER_TEMP\old-msi" -Filter *.msi | Select-Object -First 1
          if (-not $old) { throw "Failed to download a released *Setup.msi." }
          Write-Host "old MSI: $($old.Name)"
          "path=$($old.FullName)" >> $env:GITHUB_OUTPUT

      - name: Diff file lists (old vdproj MSI vs WiX staging) — informational report
        shell: pwsh
        run: |
          # 旧 MSI を管理展開 (msiexec /a) してファイル一覧を取り、staging と比較する。
          # ★この diff は情報レポート扱いで、差分があっても fail しない。理由: 最新 release は古いコードから
          #   ビルドされており版数ドリフトで無害な差分が出るため。機能ゲートは「必須/禁止ファイルの hard assert」と
          #   「アップグレード連鎖テスト」が担う。差分は人間が確認する (artifact: msi-content-diff.txt)。
          $extract = "$env:RUNNER_TEMP\old-extract"
          $p = Start-Process msiexec -ArgumentList '/a', "${{ steps.oldmsi.outputs.path }}", '/qn', "TARGETDIR=$extract" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Admin extract failed: $($p.ExitCode)" }
          $old = Get-ChildItem $extract -Recurse -File | Where-Object { $_.Extension -ne '.msi' } |
            ForEach-Object { $_.FullName.Substring((Resolve-Path $extract).Path.Length + 1) } |
            ForEach-Object { $_ -replace '^.*?\\Crystallography Software\\IPAnalyzer\\', '' } | Sort-Object
          $new = Get-ChildItem artifacts\staging-msi-x64 -Recurse -File |
            ForEach-Object { $_.FullName.Substring((Resolve-Path artifacts\staging-msi-x64).Path.Length + 1) } | Sort-Object
          $diff = Compare-Object $old $new
          $report = Join-Path $env:RUNNER_TEMP "msi-content-diff.txt"
          @("old(vdproj release) count: $($old.Count) / new(WiX staging) count: $($new.Count)",
            "(<= only in old release / => only in new WiX. Version drift makes some diffs expected — review, do not auto-fail.)", "") +
            ($diff | ForEach-Object { "{0} {1}" -f $_.SideIndicator, $_.InputObject }) | Set-Content $report
          Get-Content $report
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item $report artifacts\

      - name: Upgrade chain test (vdproj old -> WiX new -> uninstall)
        shell: pwsh
        run: |
          $wi = New-Object -ComObject WindowsInstaller.Installer
          function Get-IPAnalyzerProducts {
            $found = @()
            foreach ($pc in $wi.GetType().InvokeMember('Products','GetProperty',$null,$wi,$null)) {
              try { $name = $wi.GetType().InvokeMember('ProductInfo','GetProperty',$null,$wi,@($pc,'ProductName')) } catch { continue }
              if ($name -eq 'IPAnalyzer') { $found += [pscustomobject]@{ Code=$pc; Version=$wi.GetType().InvokeMember('ProductInfo','GetProperty',$null,$wi,@($pc,'VersionString')) } }
            }
            $found
          }
          $appDir = "$env:LOCALAPPDATA\Crystallography Software\IPAnalyzer"
          $desktopLnk = Join-Path ([Environment]::GetFolderPath('DesktopDirectory')) 'IPAnalyzer.lnk'
          $startLnk = "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Crystallography Software\IPAnalyzer.lnk"

          # 1) 旧 vdproj MSI を per-user silent install
          $p = Start-Process msiexec -ArgumentList '/i', "${{ steps.oldmsi.outputs.path }}", '/qn', '/l*v', "$env:RUNNER_TEMP\install-old.log" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "old MSI install failed: $($p.ExitCode)" }
          $prods = Get-IPAnalyzerProducts
          if ($prods.Count -ne 1) { throw "expected 1 product after old install, got $($prods.Count)" }
          Write-Host "old installed: v$($prods[0].Version) $($prods[0].Code)"
          if (-not (Test-Path "$appDir\IPAnalyzer.exe")) { throw "old install: exe missing" }

          # 2) WiX 新版 (bumped version) で Major Upgrade
          $p = Start-Process msiexec -ArgumentList '/i', "$PWD\IPAnalyzerSetup.Wix\bin\Release\IPAnalyzer-setup.msi", '/qn', '/l*v', "$env:RUNNER_TEMP\install-new.log" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "WiX MSI upgrade install failed: $($p.ExitCode)" }
          $prods = Get-IPAnalyzerProducts
          if ($prods.Count -ne 1) { throw "expected exactly 1 product after upgrade (ARP must be replaced), got $($prods.Count): $($prods | ConvertTo-Json -Compress)" }
          if ($prods[0].Version -ne '${{ steps.version.outputs.test_product_version }}') { throw "upgraded version mismatch: $($prods[0].Version)" }
          Write-Host "upgraded: v$($prods[0].Version) $($prods[0].Code)"
          foreach ($f in 'IPAnalyzer.exe','LICENSE.rtf','REQUIREMENT.rtf') {
            if (-not (Test-Path "$appDir\$f")) { throw "upgrade: $f missing in install dir" }
          }
          # Major Upgrade で旧版の glfw3.dll が除去されていること (WiX 新版は同梱しない)
          if (Test-Path "$appDir\glfw3.dll") { throw "upgrade: glfw3.dll should have been removed by Major Upgrade" }
          if (-not (Test-Path $desktopLnk)) { throw "upgrade: desktop shortcut missing" }
          if (-not (Test-Path $startLnk)) { throw "upgrade: start menu shortcut missing" }

          # 3) アンインストールで残骸ゼロ
          $code = $prods[0].Code
          $p = Start-Process msiexec -ArgumentList '/x', $code, '/qn', '/l*v', "$env:RUNNER_TEMP\uninstall.log" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "uninstall failed: $($p.ExitCode)" }
          if ((Get-IPAnalyzerProducts).Count -ne 0) { throw "product still registered after uninstall" }
          if (Test-Path "$appDir\IPAnalyzer.exe") { throw "uninstall: exe remains" }
          if (Test-Path $desktopLnk) { throw "uninstall: desktop shortcut remains" }
          if (Test-Path $startLnk) { throw "uninstall: start menu shortcut remains" }
          Write-Host "Upgrade chain test PASSED."

      - name: Upload MSI logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: wix-validate-logs
          path: ${{ runner.temp }}/*.log
          if-no-files-found: ignore

      - name: Upload artifacts (MSIs + diff report)
        uses: actions/upload-artifact@v6
        with:
          name: wix-msi-phase-a
          path: |
            IPAnalyzerSetup.Wix/bin/Release/IPAnalyzer-setup.msi
            IPAnalyzerSetup.Wix/bin/Release/IPAnalyzer-setup_arm64.msi
            artifacts/msi-content-diff.txt
